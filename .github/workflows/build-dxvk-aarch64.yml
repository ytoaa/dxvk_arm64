name: Build DXVK aarch64

on:
  workflow_dispatch:
    inputs:
      dxvk_ref:
        description: "DXVK git ref/tag"
        required: true
        default: "v3.0"
      llvm_mingw_tag:
        description: "llvm-mingw release tag"
        required: true
        default: "20260616"
      publish_release:
        description: "Upload zip to GitHub Release"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  build:
    name: Build DXVK ${{ inputs.dxvk_ref }} for Windows ARM64
    runs-on: ubuntu-22.04

    env:
      DXVK_REF: ${{ inputs.dxvk_ref }}
      LLVM_MINGW_TAG: ${{ inputs.llvm_mingw_tag }}
      PUBLISH_RELEASE: ${{ inputs.publish_release }}

    steps:
      - name: Install build dependencies
        run: |
          set -eux

          sudo apt update
          sudo apt install -y \
            git \
            curl \
            xz-utils \
            tar \
            zip \
            file \
            python3 \
            python3-pip \
            pkg-config \
            glslang-tools

          python3 -m pip install --user --upgrade meson ninja

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Check Meson and Ninja
        run: |
          set -eux

          meson --version
          ninja --version

      - name: Download llvm-mingw toolchain
        run: |
          set -eux

          mkdir -p "$HOME/toolchains"

          LLVM_MINGW_FILE="llvm-mingw-${LLVM_MINGW_TAG}-ucrt-ubuntu-22.04-x86_64.tar.xz"
          LLVM_MINGW_URL="https://github.com/mstorsjo/llvm-mingw/releases/download/${LLVM_MINGW_TAG}/${LLVM_MINGW_FILE}"

          curl -fL -o "$HOME/toolchains/${LLVM_MINGW_FILE}" "$LLVM_MINGW_URL"

          tar -xf "$HOME/toolchains/${LLVM_MINGW_FILE}" \
            -C "$HOME/toolchains"

          echo "$HOME/toolchains/llvm-mingw-${LLVM_MINGW_TAG}-ucrt-ubuntu-22.04-x86_64/bin" >> "$GITHUB_PATH"

      - name: Check cross compiler
        run: |
          set -eux

          which aarch64-w64-mingw32-clang
          which aarch64-w64-mingw32-clang++
          which aarch64-w64-mingw32-ar
          which aarch64-w64-mingw32-strip
          which aarch64-w64-mingw32-windres
          which aarch64-w64-mingw32-widl

          aarch64-w64-mingw32-clang --version

      - name: Clone DXVK source
        run: |
          set -eux

          git clone --recursive --branch "$DXVK_REF" https://github.com/doitsujin/dxvk.git dxvk

          cd dxvk
          git submodule update --init --recursive

      - name: Create aarch64 Meson cross file
        working-directory: dxvk
        run: |
          set -eux

          cat > build-winarm64.txt <<'EOF'
          [binaries]
          c = 'aarch64-w64-mingw32-clang'
          cpp = 'aarch64-w64-mingw32-clang++'
          ar = 'aarch64-w64-mingw32-ar'
          strip = 'aarch64-w64-mingw32-strip'
          windres = 'aarch64-w64-mingw32-windres'
          widl = 'aarch64-w64-mingw32-widl'

          [properties]
          needs_exe_wrapper = true

          [host_machine]
          system = 'windows'
          cpu_family = 'aarch64'
          cpu = 'aarch64'
          endian = 'little'
          EOF

          cat build-winarm64.txt

      - name: Build DXVK aarch64
        working-directory: dxvk
        run: |
          set -eux

          meson setup build.aarch64 \
            --cross-file build-winarm64.txt \
            --buildtype release \
            --prefix "$PWD/pkg" \
            --bindir aarch64 \
            --libdir aarch64 \
            --strip \
            -Db_ndebug=if-release

          ninja -C build.aarch64 install

      - name: Package DLLs
        working-directory: dxvk
        run: |
          set -eux

          DXVK_VERSION="${DXVK_REF#v}"
          OUT_NAME="dxvk-${DXVK_VERSION}-aarch64"

          mkdir -p "dist/${OUT_NAME}/aarch64"

          cp pkg/aarch64/*.dll "dist/${OUT_NAME}/aarch64/"

          if [ -f LICENSE ]; then
            cp LICENSE "dist/${OUT_NAME}/"
          fi

          if [ -f dxvk.conf ]; then
            cp dxvk.conf "dist/${OUT_NAME}/"
          fi

          file "dist/${OUT_NAME}/aarch64/"*.dll | tee "dist/${OUT_NAME}/file-info.txt"

          cd dist
          zip -r "${OUT_NAME}.zip" "${OUT_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dxvk-${{ inputs.dxvk_ref }}-aarch64
          path: dxvk/dist/*.zip
          if-no-files-found: error

      - name: Publish GitHub Release asset
        if: ${{ inputs.publish_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eux

          DXVK_VERSION="${DXVK_REF#v}"
          RELEASE_TAG="dxvk-${DXVK_VERSION}-aarch64"
          RELEASE_TITLE="DXVK ${DXVK_REF} aarch64"
          ZIP_PATH="dxvk/dist/dxvk-${DXVK_VERSION}-aarch64.zip"

          test -f "$ZIP_PATH"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes "DXVK ${DXVK_REF} built for Windows ARM64 / aarch64 using llvm-mingw ${LLVM_MINGW_TAG}."
          fi

          gh release upload "$RELEASE_TAG" "$ZIP_PATH" --clobber
